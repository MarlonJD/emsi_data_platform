emsi_data_platform:
  target: local
  outputs:
    local:
      type: postgres
      host: "{{ env_var('ANALYTICS_POSTGRES_HOST', 'analytics-postgres') }}"
      port: 5432
      user: "{{ env_var('ANALYTICS_POSTGRES_USER', 'analytics') }}"
      password: "{{ env_var('ANALYTICS_POSTGRES_PASSWORD', 'analytics_local_password') }}"
      dbname: "{{ env_var('ANALYTICS_POSTGRES_DB', 'analytics') }}"
      schema: analytics
      threads: 4
      keepalives_idle: 0
